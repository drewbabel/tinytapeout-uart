# Tiny Tapeout project information
project:
  title:        "UART (8N1 TX/RX)"
  author:       "Drew Babel"
  discord:      ""
  description:  "8-bit UART transmitter and receiver, 8N1 framing, 16x oversampled RX"
  language:     "SystemVerilog"
  clock_hz:     50000000       # FINALIZE at submission to match the TT clock you request

  # How many tiles your design occupies?
  tiles: "1x1"

  # Top module must start with "tt_um_".
  top_module:  "tt_um_drewbabel_uart"

  # Source files (in ./src). FIFO files under src/fifo/ are staged but NOT listed
  # here yet -- they are not compiled until the UART+FIFO integration is done.
  source_files:
    - "project.v"
    - "uart.sv"
    - "uart_tx.sv"
    - "uart_rx.sv"
    - "tick_gen.sv"
    - "synchronizer.sv"

# Pinout - matches src/project.v
pinout:
  # Inputs
  ui[0]: "tx_data[0]"
  ui[1]: "tx_data[1]"
  ui[2]: "tx_data[2]"
  ui[3]: "tx_data[3]"
  ui[4]: "tx_data[4]"
  ui[5]: "tx_data[5]"
  ui[6]: "tx_data[6]"
  ui[7]: "tx_data[7]"

  # Outputs
  uo[0]: "rx_data[0]"
  uo[1]: "rx_data[1]"
  uo[2]: "rx_data[2]"
  uo[3]: "rx_data[3]"
  uo[4]: "rx_data[4]"
  uo[5]: "rx_data[5]"
  uo[6]: "rx_data[6]"
  uo[7]: "rx_data[7]"

  # Bidirectional pins
  uio[0]: "rx_serial (in)"
  uio[1]: "tx_valid (in)"
  uio[2]: "tx_serial (out)"
  uio[3]: "tx_ready (out)"
  uio[4]: "rx_valid (out)"
  uio[5]: "rx_error (out)"
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
